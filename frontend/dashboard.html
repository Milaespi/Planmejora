<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planmejora — Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🏗 Planmejora</div>
    <div class="nav-right">
      <span id="navUsuario"></span>
      <button class="btn btn-sm btn-outline" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <div>
        <h2>Proyectos activos</h2>
        <p class="text-muted">Seguimiento en tiempo real</p>
      </div>
      <div class="header-actions">
        <select id="filtroEstado" class="select-sm" onchange="cargarProyectos()">
          <option value="">Todos</option>
          <option value="activo">Activos</option>
          <option value="pausado">Pausados</option>
          <option value="completado">Completados</option>
        </select>
        <button class="btn btn-primary" id="btnNuevo" onclick="abrirModal()">
          + Nuevo proyecto
        </button>
      </div>
    </div>

    <div id="loadingMsg" class="loading-msg">Cargando proyectos...</div>
    <div id="errorMsg" class="alert alert-error hidden"></div>
    <div id="proyectosGrid" class="projects-grid"></div>
  </main>

  <!-- Modal nuevo proyecto -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Nuevo Proyecto</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <form id="formProyecto" novalidate>
        <div class="form-group">
          <label>Nombre del proyecto *</label>
          <input type="text" id="pNombre" placeholder="Ej: Apartamento Cra 5 #12-34" required>
        </div>
        <div class="form-group">
          <label>Dirección *</label>
          <input type="text" id="pDireccion" placeholder="Dirección completa del apartamento" required>
        </div>
        <div class="form-group">
          <label>Cliente *</label>
          <input type="text" id="pCliente" placeholder="Nombre del cliente" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha de inicio *</label>
            <input type="date" id="pFechaInicio" required>
          </div>
          <div class="form-group">
            <label>Fecha estimada de entrega *</label>
            <input type="date" id="pFechaFin" required>
          </div>
        </div>
        <div id="modalError" class="alert alert-error hidden"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardar">Crear proyecto</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = '../backend/api';

    // ── Auth ──────────────────────────────────────────────────────
    const usuario = JSON.parse(sessionStorage.getItem('usuario') ?? 'null');
    if (!usuario) window.location.href = 'index.html';
    document.getElementById('navUsuario').textContent = `${usuario.nombre} (${usuario.rol})`;
    if (usuario.rol !== 'admin') document.getElementById('btnNuevo').style.display = 'none';

    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    // ── Cargar proyectos ─────────────────────────────────────────
    async function cargarProyectos() {
      const estado = document.getElementById('filtroEstado').value;
      const loading = document.getElementById('loadingMsg');
      const errEl   = document.getElementById('errorMsg');
      const grid    = document.getElementById('proyectosGrid');

      loading.style.display = 'block';
      errEl.classList.add('hidden');
      grid.innerHTML = '';

      try {
        const url = estado ? `${API}/proyectos.php?estado=${estado}` : `${API}/proyectos.php`;
        const res  = await fetch(url);
        const json = await res.json();

        if (!json.success) throw new Error(json.error);
        const proyectos = json.data;

        loading.style.display = 'none';

        if (!proyectos.length) {
          grid.innerHTML = '<p class="empty-msg">No hay proyectos. ¡Crea el primero!</p>';
          return;
        }

        // Para cada proyecto, cargamos fases+actividades para calcular avance
        const tarjetas = await Promise.all(proyectos.map(renderTarjeta));
        grid.innerHTML = tarjetas.join('');

      } catch (err) {
        loading.style.display = 'none';
        errEl.textContent = 'Error al cargar proyectos: ' + err.message;
        errEl.classList.remove('hidden');
      }
    }

    async function renderTarjeta(p) {
      let avance = 0, retrasadas = 0, total = 0;
      try {
        const res  = await fetch(`${API}/proyectos.php?id=${p.id}`);
        const json = await res.json();
        const fases = json.data?.fases ?? [];
        fases.forEach(f => {
          (f.actividades ?? []).forEach(a => {
            total++;
            if (a.estado === 'completada') avance++;
            if (a.estado === 'retrasada')  retrasadas++;
          });
        });
      } catch {}

      const pct      = total ? Math.round((avance / total) * 100) : 0;
      const estadoBadge = {
        activo:     '<span class="badge badge-green">Activo</span>',
        pausado:    '<span class="badge badge-yellow">Pausado</span>',
        completado: '<span class="badge badge-blue">Completado</span>',
      }[p.estado] ?? '';

      const alertaBanner = retrasadas
        ? `<div class="card-alert">⚠ ${retrasadas} actividad${retrasadas > 1 ? 'es' : ''} retrasada${retrasadas > 1 ? 's' : ''}</div>`
        : '';

      return `
        <div class="project-card" onclick="verProyecto(${p.id})">
          <div class="card-top">
            <div>
              <div class="card-title">${p.nombre}</div>
              <div class="card-sub">${p.direccion}</div>
            </div>
            ${estadoBadge}
          </div>
          <div class="card-meta">
            <span>👤 ${p.cliente}</span>
            <span>📅 Entrega: ${formatFecha(p.fecha_fin_estimada)}</span>
          </div>
          ${alertaBanner}
          <div class="progress-label">
            <span>Avance general</span><span>${pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="card-footer">
            <span class="text-muted">${avance}/${total} actividades</span>
            <span class="link-btn">Ver detalle →</span>
          </div>
        </div>`;
    }

    function verProyecto(id) {
      sessionStorage.setItem('proyectoId', id);
      window.location.href = 'proyecto.html';
    }

    // ── Modal nuevo proyecto ──────────────────────────────────────
    function abrirModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('pFechaInicio').value = new Date().toISOString().split('T')[0];
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('formProyecto').reset();
      document.getElementById('modalError').classList.add('hidden');
    }

    document.getElementById('formProyecto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('modalError');
      const btn   = document.getElementById('btnGuardar');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Creando...';

      const body = {
        nombre:             document.getElementById('pNombre').value.trim(),
        direccion:          document.getElementById('pDireccion').value.trim(),
        cliente:            document.getElementById('pCliente').value.trim(),
        fecha_inicio:       document.getElementById('pFechaInicio').value,
        fecha_fin_estimada: document.getElementById('pFechaFin').value,
      };

      try {
        const res  = await fetch(`${API}/proyectos.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModal();
        cargarProyectos();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear proyecto';
      }
    });

    // ── Utilidades ────────────────────────────────────────────────
    function formatFecha(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    cargarProyectos();
  </script>
</body>
</html>
