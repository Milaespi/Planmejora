<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planmejora — Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🏗 Planmejora</div>
    <div class="nav-right">
      <span id="navUsuario"></span>
      <button class="btn btn-sm btn-outline" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <div>
        <h2>Unidades y apartamentos</h2>
        <p class="text-muted">Seguimiento en tiempo real</p>
      </div>
      <div class="header-actions" id="accionesAdmin">
        <button class="btn btn-outline" id="btnNuevaUnidad" onclick="abrirModalUnidad()">
          + Nueva unidad
        </button>
        <button class="btn btn-primary" id="btnNuevoApto" onclick="abrirModalApto()">
          + Nuevo apartamento
        </button>
      </div>
    </div>

    <div id="loadingMsg" class="loading-msg">Cargando...</div>
    <div id="errorMsg"   class="alert alert-error hidden"></div>
    <div id="contenido"  class="hidden"></div>
  </main>

  <!-- Modal: Nueva Unidad -->
  <div id="modalUnidad" class="modal-overlay hidden">
    <div class="modal-card modal-sm">
      <div class="modal-header">
        <h3>Nueva Unidad</h3>
        <button class="modal-close" onclick="cerrarModalUnidad()">✕</button>
      </div>
      <form id="formUnidad" novalidate style="padding:20px 22px">
        <div class="form-group">
          <label>Nombre de la unidad *</label>
          <input type="text" id="uNombre" placeholder="Ej: Praia, Amaranto, Camelia" required>
        </div>
        <div class="form-group">
          <label>Dirección</label>
          <input type="text" id="uDireccion" placeholder="Dirección de la unidad">
        </div>
        <div id="errorUnidad" class="alert alert-error hidden"></div>
        <div class="modal-footer" style="padding:0;border:none;margin-top:16px">
          <button type="button" class="btn btn-outline" onclick="cerrarModalUnidad()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardarUnidad">Crear unidad</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Nuevo Apartamento -->
  <div id="modalApto" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Nuevo Apartamento</h3>
        <button class="modal-close" onclick="cerrarModalApto()">✕</button>
      </div>
      <form id="formApto" novalidate>
        <div class="form-group">
          <label>Unidad *</label>
          <select id="pUnidad" required>
            <option value="">Selecciona una unidad...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Número / identificador del apto *</label>
            <input type="text" id="pNumeroApto" placeholder="Ej: 301, Torre A-502">
          </div>
          <div class="form-group">
            <label>Cliente *</label>
            <input type="text" id="pCliente" placeholder="Nombre del propietario">
          </div>
        </div>
        <div class="form-group">
          <label>Dirección del apartamento *</label>
          <input type="text" id="pDireccion" placeholder="Dirección completa">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha de inicio *</label>
            <input type="date" id="pFechaInicio" required>
          </div>
          <div class="form-group">
            <label>Fecha estimada de entrega *</label>
            <input type="date" id="pFechaFin" required>
          </div>
        </div>
        <div id="errorApto" class="alert alert-error hidden"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="cerrarModalApto()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardarApto">Crear apartamento</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = '../backend/api';

    // ── Auth ──────────────────────────────────────────────────
    const usuario = JSON.parse(sessionStorage.getItem('usuario') ?? 'null');
    if (!usuario) window.location.href = 'index.html';
    document.getElementById('navUsuario').textContent = `${usuario.nombre} (${usuario.rol})`;

    const esAdmin = usuario.rol === 'admin';
    if (!esAdmin) document.getElementById('accionesAdmin').style.display = 'none';

    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    // ── Datos globales ────────────────────────────────────────
    let unidades = [];

    async function cargarDashboard() {
      try {
        const [resUnidades, resProyectos] = await Promise.all([
          fetch(`${API}/unidades.php`).then(r => r.json()),
          fetch(`${API}/proyectos.php`).then(r => r.json()),
        ]);
        if (!resUnidades.success) throw new Error(resUnidades.error);
        if (!resProyectos.success) throw new Error(resProyectos.error);

        unidades = resUnidades.data;
        const proyectos = resProyectos.data;

        // Para cada proyecto, cargamos avance
        const proyectosConAvance = await Promise.all(proyectos.map(cargarAvance));

        renderDashboard(unidades, proyectosConAvance);
      } catch (err) {
        document.getElementById('loadingMsg').style.display = 'none';
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = 'Error al cargar: ' + err.message;
        errEl.classList.remove('hidden');
      }
    }

    async function cargarAvance(p) {
      try {
        const res  = await fetch(`${API}/proyectos.php?id=${p.id}`);
        const json = await res.json();
        const fases = json.data?.fases ?? [];
        let total = 0, completadas = 0, retrasadas = 0;
        fases.forEach(f => (f.actividades ?? []).forEach(a => {
          total++;
          if (a.estado === 'completada') completadas++;
          if (a.estado === 'retrasada')  retrasadas++;
        }));
        return { ...p, total, completadas, retrasadas, pct: total ? Math.round(completadas / total * 100) : 0 };
      } catch {
        return { ...p, total: 0, completadas: 0, retrasadas: 0, pct: 0 };
      }
    }

    function renderDashboard(unidades, proyectos) {
      const contenido = document.getElementById('contenido');
      document.getElementById('loadingMsg').style.display = 'none';

      if (!unidades.length && !proyectos.length) {
        contenido.innerHTML = '<p class="empty-msg">No hay unidades ni apartamentos. ¡Crea la primera unidad!</p>';
        contenido.classList.remove('hidden');
        return;
      }

      // Proyectos sin unidad
      const sinUnidad = proyectos.filter(p => !p.unidad_id);

      let html = '';

      // Sección por unidad
      unidades.forEach(u => {
        const aptos = proyectos.filter(p => p.unidad_id === u.id);
        const totalAptos = aptos.length;
        const pctPromedio = totalAptos
          ? Math.round(aptos.reduce((s, p) => s + p.pct, 0) / totalAptos)
          : 0;

        html += `
          <div class="unidad-section">
            <div class="unidad-header">
              <div class="unidad-info">
                <div class="unidad-nombre">
                  <span class="unidad-icon">🏢</span>
                  ${u.nombre}
                </div>
                ${u.direccion ? `<div class="unidad-dir">${u.direccion}</div>` : ''}
              </div>
              <div class="unidad-meta">
                <span class="badge badge-blue">${totalAptos} apto${totalAptos !== 1 ? 's' : ''}</span>
                <span class="text-muted" style="font-size:12px">${pctPromedio}% avance promedio</span>
                ${esAdmin ? `<button class="btn btn-sm btn-outline" onclick="abrirModalApto(${u.id})">+ Apartamento</button>` : ''}
              </div>
            </div>
            <div class="projects-grid" style="padding:0 0 8px">
              ${aptos.length
                ? aptos.map(p => renderTarjeta(p)).join('')
                : `<p class="empty-msg" style="padding:24px">Sin apartamentos en esta unidad.</p>`
              }
            </div>
          </div>`;
      });

      // Apartamentos sin unidad
      if (sinUnidad.length) {
        html += `
          <div class="unidad-section">
            <div class="unidad-header">
              <div class="unidad-nombre"><span class="unidad-icon">📁</span> Sin unidad asignada</div>
            </div>
            <div class="projects-grid" style="padding:0 0 8px">
              ${sinUnidad.map(p => renderTarjeta(p)).join('')}
            </div>
          </div>`;
      }

      contenido.innerHTML = html || '<p class="empty-msg">No hay apartamentos registrados.</p>';
      contenido.classList.remove('hidden');
    }

    function renderTarjeta(p) {
      const estadoBadge = {
        activo:     '<span class="badge badge-green">Activo</span>',
        pausado:    '<span class="badge badge-yellow">Pausado</span>',
        completado: '<span class="badge badge-blue">Completado</span>',
      }[p.estado] ?? '';

      const alertaBanner = p.retrasadas
        ? `<div class="card-alert">⚠ ${p.retrasadas} actividad${p.retrasadas > 1 ? 'es' : ''} retrasada${p.retrasadas > 1 ? 's' : ''}</div>`
        : '';

      const subtitulo = p.numero_apto ? `Apto ${p.numero_apto}` : p.direccion;

      return `
        <div class="project-card" onclick="verProyecto(${p.id})">
          <div class="card-top">
            <div>
              <div class="card-title">${p.nombre}</div>
              <div class="card-sub">${subtitulo}</div>
            </div>
            ${estadoBadge}
          </div>
          <div class="card-meta">
            <span>👤 ${p.cliente}</span>
            <span>📅 Entrega: ${formatFecha(p.fecha_fin_estimada)}</span>
          </div>
          ${alertaBanner}
          <div class="progress-label">
            <span>Avance general</span><span>${p.pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${p.pct}%"></div>
          </div>
          <div class="card-footer">
            <span class="text-muted">${p.completadas}/${p.total} actividades</span>
            <span class="link-btn">Ver detalle →</span>
          </div>
        </div>`;
    }

    function verProyecto(id) {
      sessionStorage.setItem('proyectoId', id);
      window.location.href = 'proyecto.html';
    }

    // ── Modal Unidad ──────────────────────────────────────────
    function abrirModalUnidad() {
      document.getElementById('modalUnidad').classList.remove('hidden');
      document.getElementById('uNombre').focus();
    }
    function cerrarModalUnidad() {
      document.getElementById('modalUnidad').classList.add('hidden');
      document.getElementById('formUnidad').reset();
      document.getElementById('errorUnidad').classList.add('hidden');
    }

    document.getElementById('formUnidad').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorUnidad');
      const btn   = document.getElementById('btnGuardarUnidad');
      errEl.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'Creando...';

      try {
        const res  = await fetch(`${API}/unidades.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:    document.getElementById('uNombre').value.trim(),
            direccion: document.getElementById('uDireccion').value.trim(),
          }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModalUnidad();
        cargarDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Crear unidad';
      }
    });

    // ── Modal Apartamento ─────────────────────────────────────
    function abrirModalApto(preseleccionarUnidadId = null) {
      // Poblar select de unidades
      const sel = document.getElementById('pUnidad');
      sel.innerHTML = '<option value="">Selecciona una unidad...</option>';
      unidades.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = u.nombre;
        if (preseleccionarUnidadId && u.id === preseleccionarUnidadId) opt.selected = true;
        sel.appendChild(opt);
      });

      document.getElementById('pFechaInicio').value = new Date().toISOString().split('T')[0];
      document.getElementById('modalApto').classList.remove('hidden');
    }
    function cerrarModalApto() {
      document.getElementById('modalApto').classList.add('hidden');
      document.getElementById('formApto').reset();
      document.getElementById('errorApto').classList.add('hidden');
    }

    document.getElementById('formApto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorApto');
      const btn   = document.getElementById('btnGuardarApto');
      errEl.classList.add('hidden');

      const unidadId   = document.getElementById('pUnidad').value;
      const numeroApto = document.getElementById('pNumeroApto').value.trim();
      const cliente    = document.getElementById('pCliente').value.trim();
      const direccion  = document.getElementById('pDireccion').value.trim();
      const fechaIni   = document.getElementById('pFechaInicio').value;
      const fechaFin   = document.getElementById('pFechaFin').value;

      if (!unidadId)   { errEl.textContent = 'Selecciona una unidad'; errEl.classList.remove('hidden'); return; }
      if (!numeroApto) { errEl.textContent = 'El número de apartamento es requerido'; errEl.classList.remove('hidden'); return; }

      const unidadNombre = unidades.find(u => u.id == unidadId)?.nombre ?? 'Apartamento';

      btn.disabled = true; btn.textContent = 'Creando...';

      try {
        const res  = await fetch(`${API}/proyectos.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:             `${unidadNombre} - Apto ${numeroApto}`,
            direccion:          direccion || `${unidadNombre} Apto ${numeroApto}`,
            cliente:            cliente,
            fecha_inicio:       fechaIni,
            fecha_fin_estimada: fechaFin,
            unidad_id:          parseInt(unidadId),
            numero_apto:        numeroApto,
          }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModalApto();
        cargarDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Crear apartamento';
      }
    });

    // ── Utilidades ────────────────────────────────────────────
    function formatFecha(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    cargarDashboard();
  </script>
</body>
</html>
