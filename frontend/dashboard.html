<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planmejora — Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       BARRA DE NAVEGACIÓN SUPERIOR
       Muestra: logo, nombre empresa, campana de alertas, usuario
  ═══════════════════════════════════════════════════════════════ -->
  <nav class="navbar">
    <div class="nav-brand">
      <img src="assets/img/logo.png" alt="logo" class="nav-logo" onerror="this.style.display='none'">
      <div class="nav-logo-text">
        <span>R.E Amueblamiento de Espacios</span>
        <span>Sistema de Monitoreo</span>
      </div>
    </div>
    <div class="nav-right">
      <!-- Campana: muestra badge rojo si hay actividades retrasadas -->
      <button class="btn-bell" onclick="toggleAlertas()" title="Alertas de retraso">
        🔔<span class="bell-badge hidden" id="bellBadge">0</span>
      </button>
      <span id="navUsuario"></span>
      <button class="btn btn-sm btn-outline" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════
       CONTENIDO PRINCIPAL
  ═══════════════════════════════════════════════════════════════ -->
  <main class="container">

    <!-- Encabezado con título y botones de acción -->
    <div class="page-header">
      <div>
        <h2>Unidades y apartamentos</h2>
        <p class="text-muted">Seguimiento en tiempo real</p>
      </div>
      <div class="header-actions" id="accionesAdmin">
        <button class="btn btn-outline" onclick="abrirModalUnidad()">+ Nueva unidad</button>
        <button class="btn btn-primary" onclick="abrirModalApto()">+ Nuevo apartamento</button>
      </div>
    </div>

    <!-- Panel de alertas (se muestra al hacer clic en la campana) -->
    <div id="panelAlertas" class="alertas-panel hidden">
      <div class="alertas-panel-header">
        <h3>⚠ Actividades retrasadas</h3>
        <button class="btn btn-sm btn-danger" onclick="enviarSMS()" id="btnSMS">Enviar SMS ahora</button>
      </div>
      <!-- Lista de actividades retrasadas generada dinámicamente -->
      <div class="alertas-list" id="listaAlertas">
        <div class="alertas-empty">Cargando alertas...</div>
      </div>
    </div>

    <div id="loadingMsg" class="loading-msg">Cargando...</div>
    <div id="errorMsg"   class="alert alert-error hidden"></div>
    <!-- Aquí se inyectan las tarjetas de unidades y apartamentos -->
    <div id="contenido"  class="hidden"></div>

  </main>

  <!-- ═══════════════════════════════════════════════════════════
       MODAL: NUEVA UNIDAD
       Permite crear un conjunto residencial (Praia, Amaranto…)
  ═══════════════════════════════════════════════════════════════ -->
  <div id="modalUnidad" class="modal-overlay hidden">
    <div class="modal-card modal-sm">
      <div class="modal-header">
        <h3>Nueva Unidad</h3>
        <button class="modal-close" onclick="cerrarModalUnidad()">✕</button>
      </div>
      <form id="formUnidad" novalidate style="padding:20px 22px">
        <div class="form-group">
          <label>Nombre de la unidad *</label>
          <input type="text" id="uNombre" placeholder="Ej: Praia, Amaranto, Camelia" required>
        </div>
        <div class="form-group">
          <label>Dirección</label>
          <input type="text" id="uDireccion" placeholder="Dirección del conjunto">
        </div>
        <div id="errorUnidad" class="alert alert-error hidden"></div>
        <div class="modal-footer" style="padding:0;border:none;margin-top:16px">
          <button type="button" class="btn btn-outline" onclick="cerrarModalUnidad()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardarUnidad">Crear unidad</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       MODAL: NUEVO APARTAMENTO
       Campos: unidad, torre (opcional), apto, cliente,
               tipo contrato, fechas inicio/entrega
  ═══════════════════════════════════════════════════════════════ -->
  <div id="modalApto" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Nuevo Apartamento</h3>
        <button class="modal-close" onclick="cerrarModalApto()">✕</button>
      </div>
      <form id="formApto" novalidate>
        <div class="form-group">
          <label>Unidad *</label>
          <select id="pUnidad" required>
            <option value="">Selecciona una unidad...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Torre</label>
            <input type="text" id="pTorre" placeholder="Ej: A, B, Norte">
          </div>
          <div class="form-group">
            <label>Apto *</label>
            <input type="text" id="pNumeroApto" placeholder="Ej: 301, 502">
          </div>
        </div>
        <div class="form-group">
          <label>Cliente *</label>
          <input type="text" id="pCliente" placeholder="Nombre del propietario">
        </div>
        <!-- Tipo de contrato: determina qué fases y actividades se crean -->
        <div class="form-group">
          <label>Tipo de contrato *</label>
          <div class="contrato-options">
            <label class="contrato-opt">
              <input type="radio" name="tipoContrato" value="fase1">
              <span>
                <strong>Fase 1</strong>
                <small>Solo Obra Blanca (13 actividades)</small>
              </span>
            </label>
            <label class="contrato-opt">
              <input type="radio" name="tipoContrato" value="fase2">
              <span>
                <strong>Fase 2</strong>
                <small>Solo Amueblamiento (14 actividades)</small>
              </span>
            </label>
            <label class="contrato-opt">
              <input type="radio" name="tipoContrato" value="todo_costo" checked>
              <span>
                <strong>A todo costo</strong>
                <small>Obra Blanca + Amueblamiento (27 actividades)</small>
              </span>
            </label>
          </div>
        </div>
        <!-- Las fechas determinan la duración real; las actividades se distribuyen proporcionalmente -->
        <div class="form-row">
          <div class="form-group">
            <label>Fecha de inicio *</label>
            <input type="date" id="pFechaInicio" required>
          </div>
          <div class="form-group">
            <label>Fecha de entrega *</label>
            <input type="date" id="pFechaFin" required>
          </div>
        </div>
        <div id="errorApto" class="alert alert-error hidden"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="cerrarModalApto()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardarApto">Crear apartamento</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       MODAL: EDITAR APARTAMENTO
       Permite cambiar nombre, cliente, torre, apto y fechas
  ═══════════════════════════════════════════════════════════════ -->
  <div id="modalEditarApto" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Editar Apartamento</h3>
        <button class="modal-close" onclick="cerrarModalEditar()">✕</button>
      </div>
      <form id="formEditarApto" novalidate>
        <!-- ID oculto del proyecto que se está editando -->
        <input type="hidden" id="eId">
        <div class="form-row">
          <div class="form-group">
            <label>Torre</label>
            <input type="text" id="eTorre" placeholder="Ej: A, B, Norte">
          </div>
          <div class="form-group">
            <label>Apto *</label>
            <input type="text" id="eNumeroApto" placeholder="Ej: 301, 502">
          </div>
        </div>
        <div class="form-group">
          <label>Cliente *</label>
          <input type="text" id="eCliente" placeholder="Nombre del propietario">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha de inicio *</label>
            <input type="date" id="eFechaInicio">
          </div>
          <div class="form-group">
            <label>Fecha de entrega *</label>
            <input type="date" id="eFechaFin">
          </div>
        </div>
        <div id="errorEditarApto" class="alert alert-error hidden"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="cerrarModalEditar()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardarEditar">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       JAVASCRIPT PRINCIPAL
  ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ── Constante de la API backend ─────────────────────────── */
    const API = '../backend/api';

    /* ── Verificación de sesión activa ───────────────────────── */
    // Si no hay usuario en sessionStorage, redirige al login
    const usuario = JSON.parse(sessionStorage.getItem('usuario') ?? 'null');
    if (!usuario) window.location.href = 'index.html';
    document.getElementById('navUsuario').textContent = usuario.nombre;

    /* Función para cerrar sesión: limpia sessionStorage y vuelve al login */
    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    /* ── Variable global: lista de unidades ──────────────────── */
    // Se usa para poblar el select al crear/editar apartamentos
    let unidades = [];

    /* ── Carga inicial del dashboard ─────────────────────────── */
    // Solicita unidades y proyectos en paralelo para mayor velocidad
    async function cargarDashboard() {
      try {
        const [resUnidades, resProyectos] = await Promise.all([
          fetch(`${API}/unidades.php`).then(r => r.json()),
          fetch(`${API}/proyectos.php`).then(r => r.json()),
        ]);
        if (!resUnidades.success) throw new Error(resUnidades.error);
        if (!resProyectos.success) throw new Error(resProyectos.error);

        unidades = resUnidades.data;
        const proyectos = resProyectos.data;

        // Para cada proyecto se calcula el % de avance consultando sus fases
        const proyectosConAvance = await Promise.all(proyectos.map(cargarAvance));
        renderDashboard(unidades, proyectosConAvance);
      } catch (err) {
        document.getElementById('loadingMsg').style.display = 'none';
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = 'Error al cargar: ' + err.message;
        errEl.classList.remove('hidden');
      }
    }

    /* Calcula el avance (%) de un proyecto contando actividades completadas */
    async function cargarAvance(p) {
      try {
        const res   = await fetch(`${API}/proyectos.php?id=${p.id}`);
        const json  = await res.json();
        const fases = json.data?.fases ?? [];
        let total = 0, completadas = 0, retrasadas = 0;
        fases.forEach(f => (f.actividades ?? []).forEach(a => {
          total++;
          if (a.estado === 'completada') completadas++;
          if (a.estado === 'retrasada')  retrasadas++;
        }));
        return { ...p, total, completadas, retrasadas,
                 pct: total ? Math.round(completadas / total * 100) : 0 };
      } catch {
        return { ...p, total: 0, completadas: 0, retrasadas: 0, pct: 0 };
      }
    }

    /* ── Renderizado del dashboard ───────────────────────────── */
    // Genera HTML de secciones por unidad con sus tarjetas de apartamento
    function renderDashboard(unidades, proyectos) {
      const contenido = document.getElementById('contenido');
      document.getElementById('loadingMsg').style.display = 'none';

      if (!unidades.length && !proyectos.length) {
        contenido.innerHTML = '<p class="empty-msg">No hay unidades. ¡Crea la primera!</p>';
        contenido.classList.remove('hidden');
        return;
      }

      // Proyectos que no tienen unidad asignada
      const sinUnidad = proyectos.filter(p => !p.unidad_id);
      let html = '';

      // Renderiza una sección por cada unidad con sus apartamentos
      unidades.forEach(u => {
        const aptos       = proyectos.filter(p => p.unidad_id === u.id);
        const totalAptos  = aptos.length;
        const pctPromedio = totalAptos
          ? Math.round(aptos.reduce((s, p) => s + p.pct, 0) / totalAptos)
          : 0;

        html += `
          <div class="unidad-section">
            <div class="unidad-header">
              <div class="unidad-info">
                <div class="unidad-nombre">
                  <span class="unidad-icon">🏢</span> ${u.nombre}
                </div>
                ${u.direccion ? `<div class="unidad-dir">${u.direccion}</div>` : ''}
              </div>
              <div class="unidad-meta">
                <span class="badge badge-gold">${totalAptos} apto${totalAptos !== 1 ? 's' : ''}</span>
                <span class="text-muted" style="font-size:12px;color:#c8b87a">${pctPromedio}% promedio</span>
                <button class="btn btn-sm btn-outline" onclick="abrirModalApto(${u.id})">+ Apartamento</button>
                <button class="btn btn-sm" style="background:#7a2020;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer"
                  onclick="eliminarUnidad(${u.id}, '${u.nombre.replace(/'/g,"\\'")}')">🗑 Unidad</button>
              </div>
            </div>
            <div class="projects-grid" style="padding:16px">
              ${aptos.length
                ? aptos.map(p => renderTarjeta(p)).join('')
                : `<p class="empty-msg" style="padding:24px">Sin apartamentos en esta unidad.</p>`
              }
            </div>
          </div>`;
      });

      // Sección para proyectos sin unidad asignada
      if (sinUnidad.length) {
        html += `
          <div class="unidad-section">
            <div class="unidad-header">
              <div class="unidad-nombre"><span class="unidad-icon">📁</span> Sin unidad asignada</div>
            </div>
            <div class="projects-grid" style="padding:16px">
              ${sinUnidad.map(p => renderTarjeta(p)).join('')}
            </div>
          </div>`;
      }

      contenido.innerHTML = html || '<p class="empty-msg">No hay apartamentos registrados.</p>';
      contenido.classList.remove('hidden');
    }

    /* ── Tarjeta de apartamento ──────────────────────────────── */
    // Genera el HTML de una tarjeta individual con botones editar/eliminar
    function renderTarjeta(p) {
      // Badge de estado (activo, pausado, completado)
      const estadoBadge = {
        activo:     '<span class="badge badge-green">Activo</span>',
        pausado:    '<span class="badge badge-yellow">Pausado</span>',
        completado: '<span class="badge badge-gold">Completado</span>',
      }[p.estado] ?? '';

      // Banner de advertencia si hay actividades retrasadas
      const alertaBanner = p.retrasadas
        ? `<div class="card-alert">⚠ ${p.retrasadas} actividad${p.retrasadas > 1 ? 'es' : ''} retrasada${p.retrasadas > 1 ? 's' : ''}</div>`
        : '';

      const subtitulo = p.numero_apto
        ? (p.torre ? `Torre ${p.torre} — Apto ${p.numero_apto}` : `Apto ${p.numero_apto}`)
        : '';

      return `
        <div class="project-card">
          <!-- Clic en la tarjeta navega al detalle del proyecto -->
          <div onclick="verProyecto(${p.id})" style="cursor:pointer">
            <div class="card-top">
              <div>
                <div class="card-title">${p.nombre}</div>
                <div class="card-sub">${subtitulo}</div>
              </div>
              ${estadoBadge}
            </div>
            <div class="card-meta">
              <span>👤 ${p.cliente}</span>
              <span>📅 Entrega: ${formatFecha(p.fecha_fin_estimada)}</span>
            </div>
            ${alertaBanner}
            <div class="progress-label">
              <span>Avance</span><span>${p.pct}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${p.pct}%"></div>
            </div>
          </div>
          <!-- Pie de tarjeta: stats + botones de acción -->
          <div class="card-footer" style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
            <span class="text-muted">${p.completadas}/${p.total} actividades</span>
            <div style="display:flex;gap:6px">
              <button class="btn-act" onclick="abrirModalEditar(${p.id})">✏ Editar</button>
              <button class="btn-act" style="color:var(--red)"
                onclick="eliminarApto(${p.id}, '${p.nombre.replace(/'/g,"\\'")}')">🗑 Eliminar</button>
            </div>
          </div>
        </div>`;
    }

    /* Navega al detalle del proyecto guardando su ID en sessionStorage */
    function verProyecto(id) {
      sessionStorage.setItem('proyectoId', id);
      window.location.href = 'proyecto.html';
    }

    /* ════════════════════════════════════════════════════════════
       ELIMINAR UNIDAD
       Pide confirmación antes de borrar (el cascade elimina todos
       los apartamentos, fases y actividades de la unidad)
    ════════════════════════════════════════════════════════════ */
    async function eliminarUnidad(id, nombre) {
      if (!confirm(`¿Eliminar la unidad "${nombre}"?\n\nEsto eliminará TODOS los apartamentos y sus actividades. Esta acción no se puede deshacer.`)) return;
      try {
        const res  = await fetch(`${API}/unidades.php?id=${id}`, { method: 'DELETE' });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cargarDashboard(); // Recarga el dashboard para reflejar el cambio
      } catch (err) {
        alert('Error al eliminar: ' + err.message);
      }
    }

    /* ════════════════════════════════════════════════════════════
       ELIMINAR APARTAMENTO
       Pide confirmación; el cascade elimina fases y actividades
    ════════════════════════════════════════════════════════════ */
    async function eliminarApto(id, nombre) {
      if (!confirm(`¿Eliminar el apartamento "${nombre}"?\n\nSe eliminarán todas sus fases y actividades. Esta acción no se puede deshacer.`)) return;
      try {
        const res  = await fetch(`${API}/proyectos.php?id=${id}`, { method: 'DELETE' });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cargarDashboard();
      } catch (err) {
        alert('Error al eliminar: ' + err.message);
      }
    }

    /* ════════════════════════════════════════════════════════════
       MODAL: NUEVA UNIDAD
    ════════════════════════════════════════════════════════════ */
    function abrirModalUnidad() {
      document.getElementById('modalUnidad').classList.remove('hidden');
      document.getElementById('uNombre').focus();
    }
    function cerrarModalUnidad() {
      document.getElementById('modalUnidad').classList.add('hidden');
      document.getElementById('formUnidad').reset();
      document.getElementById('errorUnidad').classList.add('hidden');
    }

    document.getElementById('formUnidad').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorUnidad');
      const btn   = document.getElementById('btnGuardarUnidad');
      errEl.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'Creando...';
      try {
        const res  = await fetch(`${API}/unidades.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:    document.getElementById('uNombre').value.trim(),
            direccion: document.getElementById('uDireccion').value.trim(),
          }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModalUnidad();
        cargarDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Crear unidad';
      }
    });

    /* ════════════════════════════════════════════════════════════
       MODAL: NUEVO APARTAMENTO
    ════════════════════════════════════════════════════════════ */
    // Abre el modal y preselecciona la unidad si se pasa el parámetro
    function abrirModalApto(preseleccionarUnidadId = null) {
      const sel = document.getElementById('pUnidad');
      sel.innerHTML = '<option value="">Selecciona una unidad...</option>';
      unidades.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = u.nombre;
        if (preseleccionarUnidadId && u.id === preseleccionarUnidadId) opt.selected = true;
        sel.appendChild(opt);
      });
      document.getElementById('pFechaInicio').value = new Date().toISOString().split('T')[0];
      document.getElementById('modalApto').classList.remove('hidden');
    }
    function cerrarModalApto() {
      document.getElementById('modalApto').classList.add('hidden');
      document.getElementById('formApto').reset();
      document.getElementById('errorApto').classList.add('hidden');
    }

    document.getElementById('formApto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorApto');
      const btn   = document.getElementById('btnGuardarApto');
      errEl.classList.add('hidden');

      const unidadId     = document.getElementById('pUnidad').value;
      const torre        = document.getElementById('pTorre').value.trim();
      const numeroApto   = document.getElementById('pNumeroApto').value.trim();
      const cliente      = document.getElementById('pCliente').value.trim();
      const fechaIni     = document.getElementById('pFechaInicio').value;
      const fechaFin     = document.getElementById('pFechaFin').value;
      const tipoContrato = document.querySelector('input[name="tipoContrato"]:checked')?.value ?? 'todo_costo';

      // Validaciones básicas antes de enviar al servidor
      if (!unidadId)   { errEl.textContent = 'Selecciona una unidad';              errEl.classList.remove('hidden'); return; }
      if (!numeroApto) { errEl.textContent = 'El número de apartamento es requerido'; errEl.classList.remove('hidden'); return; }
      if (!cliente)    { errEl.textContent = 'El nombre del cliente es requerido';  errEl.classList.remove('hidden'); return; }
      if (!fechaFin)   { errEl.textContent = 'La fecha de entrega es requerida';    errEl.classList.remove('hidden'); return; }

      // Nombre automático: "Praia Torre A Apto 301" o "Praia Apto 301"
      const unidadNombre = unidades.find(u => u.id == unidadId)?.nombre ?? '';
      const torreStr     = torre ? ` Torre ${torre}` : '';
      const nombreAuto   = `${unidadNombre}${torreStr} Apto ${numeroApto}`;

      btn.disabled = true; btn.textContent = 'Creando...';
      try {
        const res  = await fetch(`${API}/proyectos.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:             nombreAuto,
            cliente,
            fecha_inicio:       fechaIni,
            fecha_fin_estimada: fechaFin,
            unidad_id:          parseInt(unidadId),
            numero_apto:        numeroApto,
            torre:              torre || null,
            tipo_contrato:      tipoContrato,
          }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModalApto();
        cargarDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Crear apartamento';
      }
    });

    /* ════════════════════════════════════════════════════════════
       MODAL: EDITAR APARTAMENTO
       Carga los datos actuales del proyecto en el formulario
    ════════════════════════════════════════════════════════════ */
    async function abrirModalEditar(id) {
      // Busca el proyecto en el servidor para tener datos frescos
      try {
        const res  = await fetch(`${API}/proyectos.php?id=${id}`);
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        const p = json.data;

        // Precarga los campos con los valores actuales
        document.getElementById('eId').value          = p.id;
        document.getElementById('eTorre').value        = p.torre       ?? '';
        document.getElementById('eNumeroApto').value   = p.numero_apto ?? '';
        document.getElementById('eCliente').value      = p.cliente;
        document.getElementById('eFechaInicio').value  = p.fecha_inicio;
        document.getElementById('eFechaFin').value     = p.fecha_fin_estimada;

        document.getElementById('modalEditarApto').classList.remove('hidden');
      } catch (err) {
        alert('Error al cargar datos: ' + err.message);
      }
    }
    function cerrarModalEditar() {
      document.getElementById('modalEditarApto').classList.add('hidden');
      document.getElementById('formEditarApto').reset();
      document.getElementById('errorEditarApto').classList.add('hidden');
    }

    document.getElementById('formEditarApto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorEditarApto');
      const btn   = document.getElementById('btnGuardarEditar');
      errEl.classList.add('hidden');

      const id         = document.getElementById('eId').value;
      const torre      = document.getElementById('eTorre').value.trim();
      const numeroApto = document.getElementById('eNumeroApto').value.trim();
      const cliente    = document.getElementById('eCliente').value.trim();
      const fechaIni   = document.getElementById('eFechaInicio').value;
      const fechaFin   = document.getElementById('eFechaFin').value;

      if (!numeroApto) { errEl.textContent = 'El número de apartamento es requerido'; errEl.classList.remove('hidden'); return; }
      if (!cliente)    { errEl.textContent = 'El nombre del cliente es requerido';     errEl.classList.remove('hidden'); return; }

      // Reconstruye el nombre automático con los nuevos valores
      const res0  = await fetch(`${API}/proyectos.php?id=${id}`);
      const json0 = await res0.json();
      const unidadId = json0.data?.unidad_id;
      const unidadNombre = unidades.find(u => u.id === unidadId)?.nombre ?? '';
      const torreStr     = torre ? ` Torre ${torre}` : '';
      const nombreNuevo  = unidadNombre
        ? `${unidadNombre}${torreStr} Apto ${numeroApto}`
        : `${torreStr ? `Torre ${torre} ` : ''}Apto ${numeroApto}`;

      btn.disabled = true; btn.textContent = 'Guardando...';
      try {
        const res  = await fetch(`${API}/proyectos.php?id=${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:             nombreNuevo,
            cliente,
            fecha_inicio:       fechaIni,
            fecha_fin_estimada: fechaFin,
            torre:              torre || null,
            numero_apto:        numeroApto,
          }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModalEditar();
        cargarDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Guardar cambios';
      }
    });

    /* ── Utilidades de fecha ─────────────────────────────────── */
    // Convierte "2026-07-15" → "15/07/2026" para mostrar al usuario
    function formatFecha(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    /* ════════════════════════════════════════════════════════════
       SISTEMA DE NOTIFICACIONES / ALERTAS SMS
    ════════════════════════════════════════════════════════════ */
    let alertasData = [];

    // Carga las actividades retrasadas desde el backend
    async function cargarAlertas() {
      try {
        const res  = await fetch(`${API}/notificaciones.php`);
        const json = await res.json();
        if (!json.success) return;
        alertasData = json.data;

        // Actualiza el badge de la campana con el número de retrasos
        const badge = document.getElementById('bellBadge');
        if (alertasData.length > 0) {
          badge.textContent = alertasData.length;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }

        // Construye la lista de alertas en el panel desplegable
        const lista = document.getElementById('listaAlertas');
        if (!alertasData.length) {
          lista.innerHTML = '<div class="alertas-empty">✅ Sin actividades retrasadas</div>';
          return;
        }
        lista.innerHTML = alertasData.map(a => `
          <div class="alerta-item" onclick="verProyecto(${a.proyecto_id})" style="cursor:pointer">
            <div class="alerta-info">
              <div class="alerta-nombre">${a.actividad}</div>
              <div class="alerta-meta">${a.proyecto} · ${a.fase}</div>
            </div>
            <div class="alerta-dias">${a.dias_retraso}d de retraso</div>
          </div>`).join('');
      } catch {}
    }

    // Muestra u oculta el panel de alertas al hacer clic en la campana
    function toggleAlertas() {
      document.getElementById('panelAlertas').classList.toggle('hidden');
    }

    // Dispara el script Python de Twilio para enviar SMS al supervisor
    async function enviarSMS() {
      const btn = document.getElementById('btnSMS');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const res  = await fetch(`${API}/notificaciones.php`, { method: 'POST' });
        const text = await res.text();
        let json;
        try { json = JSON.parse(text); }
        catch { alert('Respuesta inesperada del servidor:\n\n' + text); btn.disabled=false; btn.textContent='Enviar SMS ahora'; return; }

        // Muestra el resultado real del script en un alert para saber si funcionó
        if (json.success) {
          const salida = json.data?.salida?.trim();
          const codigo = json.data?.codigo;
          if (codigo === 0 && salida) {
            alert('✅ SMS procesado\n\n' + salida);
            btn.textContent = 'SMS enviados ✓';
          } else if (salida) {
            alert('⚠ El script terminó con errores:\n\n' + salida);
            btn.textContent = 'Revisar salida';
          } else {
            alert('✅ Script ejecutado sin salida (puede que no haya actividades retrasadas pendientes de alertar).');
            btn.textContent = 'Ejecutado';
          }
        } else {
          alert('❌ Error: ' + (json.error ?? 'No se pudo ejecutar el script'));
          btn.textContent = 'Error al enviar';
        }
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Enviar SMS ahora'; }, 4000);
      } catch (err) {
        alert('❌ Error de red: ' + err.message);
        btn.textContent = 'Error';
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Enviar SMS ahora'; }, 3000);
      }
    }

    /* ── Inicio ──────────────────────────────────────────────── */
    cargarDashboard();
    cargarAlertas();
  </script>
</body>
