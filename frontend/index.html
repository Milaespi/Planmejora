<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planmejora — Ingreso</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">🏗</span>
      <h1>R.E Amueblamiento</h1>
      <p>Sistema de Monitoreo de Obras</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="nombre">Usuario</label>
        <input type="text" id="nombre" placeholder="Tu nombre completo" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Contraseña" required>
      </div>
      <div id="loginError" class="alert alert-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
        Ingresar al sistema
      </button>
    </form>
  </div>

  <script>
    // Limpiar sesión anterior al cargar login
    sessionStorage.clear();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nombre   = document.getElementById('nombre').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('loginError');
      const btn      = document.getElementById('btnLogin');

      errEl.classList.add('hidden');
      if (!nombre || !password) {
        errEl.textContent = 'Por favor completa todos los campos.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        const res  = await fetch('../backend/api/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, password }),
        });
        const json = await res.json();

        if (!json.success) throw new Error(json.error);

        const usuario = json.data;
        sessionStorage.setItem('usuario', JSON.stringify(usuario));

        if (usuario.rol === 'trabajador') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        errEl.textContent = err.message || 'Error de conexión. Intenta de nuevo.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar al sistema';
      }
    });
  </script>
</body>
</html>
