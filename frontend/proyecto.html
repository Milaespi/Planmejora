<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planmejora — Proyecto</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       BARRA DE NAVEGACIÓN
       Muestra el logo, un enlace para volver al dashboard, el nombre del proyecto,
       el nombre del usuario logueado y un botón para cerrar sesión.
  ═══════════════════════════════════════════════════════════════════════════════ -->
  <nav class="navbar">
    <div class="nav-brand">
      <img src="assets/img/logo.png" alt="logo" class="nav-logo" onerror="this.style.display='none'">
      <div class="nav-logo-text">
        <!-- Enlace para volver al listado de proyectos -->
        <span><a href="dashboard.html" class="back-link">← Volver</a></span>
        <!-- Nombre del proyecto actual (se llena dinámicamente con JS) -->
        <span id="navNombreProyecto" style="color:#c8b87a;font-size:11px">Cargando...</span>
      </div>
    </div>
    <div class="nav-right">
      <!-- Nombre del usuario logueado (se llena desde sessionStorage) -->
      <span id="navUsuario"></span>
      <button class="btn btn-sm btn-outline" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       CONTENIDO PRINCIPAL
  ═══════════════════════════════════════════════════════════════════════════════ -->
  <main class="container">
    <!-- Mensaje mientras se carga el proyecto desde la API -->
    <div id="loadingMsg" class="loading-msg">Cargando proyecto...</div>
    <!-- Si la API devuelve error, se muestra aquí -->
    <div id="errorMsg"   class="alert alert-error hidden"></div>
    <!-- Todo el contenido real está oculto hasta que los datos carguen -->
    <div id="contenido"  class="hidden">

      <!-- ─── Barra de información del proyecto ────────────────────────────── -->
      <!-- Muestra cliente, fechas y estado del proyecto en una fila horizontal -->
      <div class="project-info-bar">
        <div class="info-item"><span class="info-label">Cliente</span><span id="infoCliente"></span></div>
        <div class="info-item"><span class="info-label">Inicio</span><span id="infoInicio"></span></div>
        <div class="info-item"><span class="info-label">Entrega estimada</span><span id="infoFin"></span></div>
        <div class="info-item"><span class="info-label">Estado</span><span id="infoEstado"></span></div>
      </div>

      <!-- ─── Barra de avance general del proyecto ──────────────────────────── -->
      <!-- Muestra el porcentaje de actividades completadas y un botón al reporte -->
      <div class="avance-bar-section">
        <div class="progress-label">
          <span>Avance general del proyecto</span>
          <div style="display:flex;align-items:center;gap:12px">
            <!-- Porcentaje calculado como (completadas / total) × 100 -->
            <span id="avancePct" class="avance-pct">0%</span>
            <!-- Navega a reportes.html para ver el reporte imprimible -->
            <button class="btn btn-sm btn-outline" onclick="verReporte()">Ver reporte</button>
          </div>
        </div>
        <!-- Barra visual de progreso; su ancho se ajusta con JS -->
        <div class="progress-bar progress-bar-lg">
          <div id="avanceFill" class="progress-fill" style="width:0%"></div>
        </div>
        <!-- Resumen numérico: completadas, en progreso, retrasadas, total -->
        <div class="avance-stats" id="avanceStats"></div>
      </div>

      <!-- ─── Contenedor de fases ───────────────────────────────────────────── -->
      <!-- Aquí se inyecta dinámicamente el HTML de cada fase con sus actividades -->
      <div id="fasesContainer"></div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       MODAL: CAMBIO DE ESTADO DE ACTIVIDAD
       Se abre al hacer clic en "Cambiar" en una fila de actividad.
       Permite seleccionar el nuevo estado y guardarlo vía PATCH /actividades.php
  ═══════════════════════════════════════════════════════════════════════════════ -->
  <div id="modalEstado" class="modal-overlay hidden">
    <div class="modal-card modal-sm">
      <div class="modal-header">
        <h3>Actualizar actividad</h3>
        <!-- Botón X para cerrar sin guardar -->
        <button class="modal-close" onclick="cerrarModalEstado()">✕</button>
      </div>
      <!-- Nombre de la actividad que se está actualizando -->
      <div id="modalActNombre" class="modal-act-nombre"></div>
      <div class="form-group" style="margin-top:14px">
        <label>Nuevo estado</label>
        <!-- Desplegable con los cuatro estados posibles de una actividad -->
        <select id="nuevoEstado">
          <option value="pendiente">⏳ Pendiente</option>
          <option value="en_progreso">🔄 En progreso</option>
          <option value="completada">✅ Completada</option>
          <option value="retrasada">⚠ Retrasada</option>
        </select>
      </div>
      <!-- Mensaje de error si la petición PATCH falla -->
      <div id="modalEstadoError" class="alert alert-error hidden"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="cerrarModalEstado()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarEstado()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constante base para todas las peticiones a la API ─────────────────────
    const API = '../backend/api';

    // ── Verificación de autenticación ─────────────────────────────────────────
    // Lee el usuario del sessionStorage; si no hay sesión activa, redirige al login
    const usuario    = JSON.parse(sessionStorage.getItem('usuario') ?? 'null');
    // Lee el ID del proyecto que se está viendo (guardado al hacer clic en el dashboard)
    const proyectoId = sessionStorage.getItem('proyectoId');

    if (!usuario)    window.location.href = 'index.html';     // Sin usuario → login
    if (!proyectoId) window.location.href = 'dashboard.html'; // Sin proyecto → volver al listado

    // Navega a la página de reporte del proyecto actual
    function verReporte() { window.location.href = 'reportes.html'; }

    // Muestra el nombre del usuario en la navbar
    document.getElementById('navUsuario').textContent = usuario.nombre;

    // Variable global que guarda el ID de la actividad que se está editando en el modal
    let actividadSeleccionada = null;

    // Limpia la sesión y vuelve al login
    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    // ── Cargar datos del proyecto desde la API ────────────────────────────────
    async function cargarProyecto() {
      try {
        // Hace GET /proyectos.php?id=X — devuelve el proyecto con fases y actividades
        const res  = await fetch(`${API}/proyectos.php?id=${proyectoId}`);
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        renderProyecto(json.data); // Pinta todos los datos en la página
      } catch (err) {
        // Si falla, oculta el "Cargando..." y muestra el mensaje de error
        document.getElementById('loadingMsg').style.display = 'none';
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = 'Error al cargar el proyecto: ' + err.message;
        errEl.classList.remove('hidden');
      }
    }

    // ── Pintar los datos del proyecto en el DOM ───────────────────────────────
    function renderProyecto(p) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('contenido').classList.remove('hidden');

      // Llena la barra de información con los datos del proyecto
      document.getElementById('navNombreProyecto').textContent = p.nombre;
      document.getElementById('infoCliente').textContent = p.cliente;
      document.getElementById('infoInicio').textContent  = formatFecha(p.fecha_inicio);
      document.getElementById('infoFin').textContent     = formatFecha(p.fecha_fin_estimada);
      document.getElementById('infoEstado').innerHTML    = badgeEstadoProyecto(p.estado);

      // ── Calcular avance total ──────────────────────────────────────────────
      // Recorre todas las fases y sus actividades para contar por estado
      let total = 0, completadas = 0, retrasadas = 0, enProgreso = 0;
      (p.fases ?? []).forEach(f => {
        (f.actividades ?? []).forEach(a => {
          total++;
          if (a.estado === 'completada') completadas++;
          if (a.estado === 'retrasada')  retrasadas++;
          if (a.estado === 'en_progreso') enProgreso++;
        });
      });

      // Calcula el porcentaje de avance (0 si no hay actividades)
      const pct = total ? Math.round((completadas / total) * 100) : 0;
      document.getElementById('avancePct').textContent = `${pct}%`;
      document.getElementById('avanceFill').style.width = `${pct}%`;

      // Muestra el resumen numérico debajo de la barra de progreso
      document.getElementById('avanceStats').innerHTML =
        `<span>✅ ${completadas} completadas</span>` +
        `<span>🔄 ${enProgreso} en progreso</span>` +
        // Solo muestra retrasadas si hay al menos una
        (retrasadas ? `<span class="text-danger">⚠ ${retrasadas} retrasadas</span>` : '') +
        `<span class="text-muted">Total: ${total}</span>`;

      // ── Pintar las fases ───────────────────────────────────────────────────
      const fasesCont = document.getElementById('fasesContainer');
      fasesCont.innerHTML = (p.fases ?? []).map(renderFase).join('');
    }

    // ── Construir el HTML de una fase con su tabla de actividades ─────────────
    function renderFase(fase) {
      const acts  = fase.actividades ?? [];
      const total = acts.length;
      const comp  = acts.filter(a => a.estado === 'completada').length;
      const pct   = total ? Math.round((comp / total) * 100) : 0;

      // Nombre visual según el orden de la fase
      const nombre = fase.orden === 1 ? '🏗 Fase 1 — Obra Blanca' : '🪵 Fase 2 — Amueblamiento';

      // Construye las filas de la tabla, una por actividad
      const filas = acts.map(a => {
        // Solo pueden cambiar el estado usuarios con estos roles
        const puedeCambiar = ['admin', 'supervisor', 'trabajador'].includes(usuario.rol);
        const btnCambiar = puedeCambiar
          // Al hacer clic abre el modal con el ID, nombre y estado actual de la actividad
          ? `<button class="btn-act" onclick="abrirModalEstado(${a.id}, '${escapar(a.nombre)}', '${a.estado}')">Cambiar</button>`
          : '';
        return `
          <tr class="act-row act-${a.estado}">
            <td class="act-orden">${a.orden}</td>
            <td class="act-icono">${iconoEstado(a.estado)}</td>
            <td class="act-nombre">${a.nombre}</td>
            <td class="act-estado">${badgeEstadoAct(a.estado)}</td>
            <td class="act-fecha">${a.fecha_estimada ? formatFecha(a.fecha_estimada) : '—'}</td>
            <td class="act-fecha">${a.fecha_completada ? formatFecha(a.fecha_completada) : '—'}</td>
            <td>${btnCambiar}</td>
          </tr>`;
      }).join('');

      return `
        <div class="fase-section">
          <div class="fase-header">
            <div>
              <div class="fase-titulo">${nombre}</div>
              <div class="text-muted">${comp}/${total} actividades completadas</div>
            </div>
            <div class="fase-pct">${pct}%</div>
          </div>
          <!-- Barra de progreso de esta fase; azul para Obra Blanca, verde para Amueblamiento -->
          <div class="progress-bar" style="margin:0 0 12px">
            <div class="progress-fill" style="width:${pct}%;background:${fase.orden===1?'#2472a4':'#1a6b3a'}"></div>
          </div>
          <div class="table-responsive">
            <table class="act-table">
              <thead>
                <tr>
                  <th>#</th><th></th><th>Actividad</th><th>Estado</th>
                  <th>Fecha estimada</th><th>Fecha completada</th><th></th>
                </tr>
              </thead>
              <tbody>${filas}</tbody>
            </table>
          </div>
        </div>`;
    }

    // ── Control del modal de cambio de estado ─────────────────────────────────

    // Abre el modal con los datos de la actividad seleccionada
    function abrirModalEstado(id, nombre, estadoActual) {
      actividadSeleccionada = id; // Guarda el ID para usarlo al guardar
      document.getElementById('modalActNombre').textContent = nombre;
      document.getElementById('nuevoEstado').value = estadoActual; // Pre-selecciona el estado actual
      document.getElementById('modalEstadoError').classList.add('hidden');
      document.getElementById('modalEstado').classList.remove('hidden');
    }

    // Cierra el modal sin guardar cambios
    function cerrarModalEstado() {
      document.getElementById('modalEstado').classList.add('hidden');
      actividadSeleccionada = null;
    }

    // Envía el nuevo estado al backend y recarga el proyecto
    async function guardarEstado() {
      if (!actividadSeleccionada) return;
      const estado = document.getElementById('nuevoEstado').value;
      const errEl  = document.getElementById('modalEstadoError');
      errEl.classList.add('hidden');

      try {
        // PATCH /actividades.php?id=X con el nuevo estado
        const res  = await fetch(`${API}/actividades.php?id=${actividadSeleccionada}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estado }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        cerrarModalEstado();
        cargarProyecto(); // Recarga para reflejar el cambio en la tabla
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    // ── Funciones utilitarias ─────────────────────────────────────────────────

    // Devuelve el emoji correspondiente al estado de una actividad
    function iconoEstado(e) {
      return { pendiente:'⏳', en_progreso:'🔄', completada:'✅', retrasada:'⚠' }[e] ?? '—';
    }

    // Devuelve un badge HTML coloreado según el estado de una actividad
    function badgeEstadoAct(e) {
      const cls = { pendiente:'badge-gray', en_progreso:'badge-orange', completada:'badge-green', retrasada:'badge-red' }[e] ?? '';
      const txt = { pendiente:'Pendiente', en_progreso:'En progreso', completada:'Completada', retrasada:'Retrasada' }[e] ?? e;
      return `<span class="badge ${cls}">${txt}</span>`;
    }

    // Devuelve un badge HTML coloreado según el estado del proyecto
    function badgeEstadoProyecto(e) {
      const cls = { activo:'badge-green', pausado:'badge-yellow', completado:'badge-blue' }[e] ?? '';
      return `<span class="badge ${cls}">${e.charAt(0).toUpperCase()+e.slice(1)}</span>`;
    }

    // Convierte fecha YYYY-MM-DD a DD/MM/YYYY para mostrar al usuario
    function formatFecha(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    // Escapa comillas simples en nombres para que no rompan el atributo onclick="..."
    function escapar(s) {
      return s.replace(/'/g, "\\'");
    }

    // ── Inicio: carga el proyecto al abrir la página ──────────────────────────
    cargarProyecto();
  </script>
</body>
</html>
