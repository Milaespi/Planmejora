<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planmejora — Reporte de Proyecto</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* ── Reporte ───────────────────────────────────────────── */
    .report-header {
      background: var(--navy);
      color: #fff;
      border-radius: var(--radius);
      padding: 22px 26px;
      margin-bottom: 20px;
    }
    .report-header h1 { font-size: 20px; margin-bottom: 4px; }
    .report-header p  { font-size: 12.5px; color: #b0c4d8; }
    .report-meta {
      display: flex; gap: 28px; flex-wrap: wrap;
      margin-top: 14px; border-top: 1px solid rgba(255,255,255,.15);
      padding-top: 12px; font-size: 13px;
    }
    .report-meta-item label {
      display: block; font-size: 10px; color: #90a4ae;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px; margin-bottom: 20px;
    }
    .stat-card {
      background: #fff; border-radius: var(--radius);
      padding: 14px 18px; box-shadow: var(--shadow); text-align: center;
    }
    .stat-num   { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 11.5px; color: var(--gray); margin-top: 4px; }
    .stat-completada { color: var(--green); }
    .stat-retrasada  { color: var(--red); }
    .stat-progreso   { color: var(--blue); }
    .stat-pendiente  { color: var(--gray); }

    .fase-reporte {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden;
    }
    .fase-reporte-header {
      background: var(--navy); color: #fff;
      padding: 12px 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .fase-reporte-header h3 { font-size: 15px; }
    .fase-reporte-header span { font-size: 13px; color: #b0c4d8; }

    .rep-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rep-table th {
      padding: 9px 12px; text-align: left; background: var(--bg);
      font-size: 11px; color: var(--gray); text-transform: uppercase;
      letter-spacing: .5px; border-bottom: 1px solid var(--border);
    }
    .rep-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .rep-table tr:last-child td { border-bottom: none; }
    .rep-table tr.completada td { color: var(--gray); }
    .rep-table tr.retrasada  td:first-child { border-left: 3px solid var(--red); }
    .rep-table tr.en_progreso td:first-child { border-left: 3px solid var(--blue); }

    .col-ord  { width: 36px; color: var(--gray); text-align: center; }
    .col-est  { width: 120px; }
    .col-fecha{ width: 110px; font-size: 12px; color: var(--gray); }
    .col-dias { width: 80px; font-size: 12px; text-align: center; }

    .print-bar {
      position: sticky; top: 56px; z-index: 90;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }
    .print-bar .container-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .print-bar p { font-size: 12.5px; color: var(--gray); }

    .avance-section {
      background: #fff; border-radius: var(--radius);
      padding: 16px 20px; box-shadow: var(--shadow); margin-bottom: 20px;
    }

    /* ── Print ─────────────────────────────────────────────── */
    @media print {
      .navbar, .print-bar { display: none !important; }
      body { background: #fff; font-size: 11pt; }
      .container { padding: 0; max-width: 100%; }
      .report-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .fase-reporte-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .stat-card, .fase-reporte, .avance-section { box-shadow: none; border: 1px solid #ddd; }
      .progress-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <img src="assets/img/logo.png" alt="logo" class="nav-logo" onerror="this.style.display='none'">
      <div class="nav-logo-text">
        <span><a href="proyecto.html" class="back-link">← Volver al proyecto</a></span>
        <span style="color:#c8b87a;font-size:10px">Reporte de proyecto</span>
      </div>
    </div>
    <div class="nav-right">
      <span id="navUsuario"></span>
      <button class="btn btn-sm btn-outline" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <div class="print-bar">
    <div class="container-inner">
      <p>Reporte generado el <strong id="fechaGenerado"></strong> — Para exportar a PDF usa <kbd>Ctrl+P</kbd> → Guardar como PDF</p>
      <button class="btn btn-primary btn-sm" onclick="window.print()">Imprimir / Exportar PDF</button>
    </div>
  </div>

  <main class="container">
    <div id="loadingMsg" class="loading-msg">Generando reporte...</div>
    <div id="errorMsg"   class="alert alert-error hidden"></div>
    <div id="contenido"  class="hidden">

      <!-- Encabezado del reporte -->
      <div class="report-header">
        <h1 id="repNombre"></h1>
        <p>R.E Amueblamiento de Espacios S.A.S. — Sistema de Monitoreo Planmejora</p>
        <div class="report-meta">
          <div class="report-meta-item">
            <label>Cliente</label>
            <span id="repCliente"></span>
          </div>
          <div class="report-meta-item">
            <label>Dirección</label>
            <span id="repDireccion"></span>
          </div>
          <div class="report-meta-item">
            <label>Fecha inicio</label>
            <span id="repInicio"></span>
          </div>
          <div class="report-meta-item">
            <label>Entrega estimada</label>
            <span id="repFin"></span>
          </div>
          <div class="report-meta-item">
            <label>Estado</label>
            <span id="repEstado"></span>
          </div>
        </div>
      </div>

      <!-- Avance general -->
      <div class="avance-section">
        <div class="progress-label">
          <span style="font-weight:600">Avance general del proyecto</span>
          <span id="repPct" class="avance-pct">0%</span>
        </div>
        <div class="progress-bar progress-bar-lg" style="margin-bottom:10px">
          <div id="repFill" class="progress-fill" style="width:0%"></div>
        </div>
        <!-- Stats -->
        <div class="stats-row" id="statsRow"></div>
      </div>

      <!-- Fases y actividades -->
      <div id="fasesReporte"></div>

    </div>
  </main>

  <script>
    const API = '../backend/api';

    // ── Auth ──────────────────────────────────────────────────
    const usuario = JSON.parse(sessionStorage.getItem('usuario') ?? 'null');
    if (!usuario) window.location.href = 'index.html';
    document.getElementById('navUsuario').textContent = usuario.nombre;
    document.getElementById('fechaGenerado').textContent = new Date().toLocaleDateString('es-CO', {
      day: '2-digit', month: 'long', year: 'numeric'
    });

    function cerrarSesion() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    // ── Cargar reporte ────────────────────────────────────────
    async function cargarReporte() {
      const proyectoId = sessionStorage.getItem('proyectoId');
      if (!proyectoId) {
        window.location.href = 'dashboard.html';
        return;
      }

      try {
        const res  = await fetch(`${API}/proyectos.php?id=${proyectoId}`);
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        renderReporte(json.data);
      } catch (err) {
        document.getElementById('loadingMsg').style.display = 'none';
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = 'Error al cargar el reporte: ' + err.message;
        errEl.classList.remove('hidden');
      }
    }

    function renderReporte(p) {
      // Info general
      document.getElementById('repNombre').textContent    = p.nombre;
      document.getElementById('repCliente').textContent   = p.cliente;
      document.getElementById('repDireccion').textContent = p.direccion;
      document.getElementById('repInicio').textContent    = formatFecha(p.fecha_inicio);
      document.getElementById('repFin').textContent       = formatFecha(p.fecha_fin_estimada);
      document.getElementById('repEstado').textContent    = p.estado.charAt(0).toUpperCase() + p.estado.slice(1);

      // Calcular totales
      const fases = p.fases ?? [];
      let total = 0, completadas = 0, retrasadas = 0, enProgreso = 0, pendientes = 0;

      fases.forEach(f => {
        (f.actividades ?? []).forEach(a => {
          total++;
          if (a.estado === 'completada')  completadas++;
          if (a.estado === 'retrasada')   retrasadas++;
          if (a.estado === 'en_progreso') enProgreso++;
          if (a.estado === 'pendiente')   pendientes++;
        });
      });

      const pct = total ? Math.round((completadas / total) * 100) : 0;
      document.getElementById('repPct').textContent       = pct + '%';
      document.getElementById('repFill').style.width      = pct + '%';

      // Stats cards
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card">
          <div class="stat-num stat-completada">${completadas}</div>
          <div class="stat-label">Completadas</div>
        </div>
        <div class="stat-card">
          <div class="stat-num stat-progreso">${enProgreso}</div>
          <div class="stat-label">En progreso</div>
        </div>
        <div class="stat-card">
          <div class="stat-num stat-pendiente">${pendientes}</div>
          <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-num stat-retrasada">${retrasadas}</div>
          <div class="stat-label">Retrasadas</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--navy)">${total}</div>
          <div class="stat-label">Total actividades</div>
        </div>
      `;

      // Fases
      const hoy = new Date();
      hoy.setHours(0, 0, 0, 0);

      const fasesHTML = fases.map(f => {
        const acts = f.actividades ?? [];
        const fComp = acts.filter(a => a.estado === 'completada').length;
        const fPct  = acts.length ? Math.round((fComp / acts.length) * 100) : 0;

        const filas = acts.map(a => {
          const fechaEst = a.fecha_estimada ? new Date(a.fecha_estimada + 'T00:00:00') : null;
          let diasStr = '—';
          if (fechaEst) {
            const diff = Math.round((fechaEst - hoy) / 86400000);
            if (a.estado === 'completada') {
              diasStr = a.fecha_completada
                ? '<span style="color:var(--green)">Completada</span>'
                : '<span style="color:var(--green)">Completada</span>';
            } else if (diff < 0) {
              diasStr = `<span class="text-danger">${Math.abs(diff)}d retraso</span>`;
            } else if (diff === 0) {
              diasStr = '<span style="color:var(--orange)">Hoy</span>';
            } else {
              diasStr = `<span style="color:var(--gray)">${diff}d restantes</span>`;
            }
          }

          const iconos = {
            completada: '✅', en_progreso: '🔵', retrasada: '🔴', pendiente: '⬜'
          };

          const badgeMap = {
            completada:  'badge-green',
            en_progreso: 'badge-blue',
            retrasada:   'badge-red',
            pendiente:   'badge-gray',
          };
          const badgeTxt = {
            completada: 'Completada', en_progreso: 'En progreso',
            retrasada: 'Retrasada', pendiente: 'Pendiente',
          };

          return `
            <tr class="${a.estado}">
              <td class="col-ord">${a.orden}</td>
              <td>${iconos[a.estado] ?? '⬜'} ${a.nombre}</td>
              <td style="font-size:12px;color:var(--gray)">${a.descripcion ?? '—'}</td>
              <td class="col-est">
                <span class="badge ${badgeMap[a.estado] ?? 'badge-gray'}">${badgeTxt[a.estado] ?? a.estado}</span>
              </td>
              <td class="col-fecha">${formatFecha(a.fecha_estimada)}</td>
              <td class="col-dias">${diasStr}</td>
            </tr>`;
        }).join('');

        return `
          <div class="fase-reporte">
            <div class="fase-reporte-header">
              <h3>${f.nombre}</h3>
              <span>${fComp}/${acts.length} actividades — ${fPct}% completado</span>
            </div>
            <div class="progress-bar" style="border-radius:0;height:6px">
              <div class="progress-fill" style="width:${fPct}%"></div>
            </div>
            <table class="rep-table">
              <thead>
                <tr>
                  <th class="col-ord">#</th>
                  <th>Actividad</th>
                  <th>Descripción</th>
                  <th class="col-est">Estado</th>
                  <th class="col-fecha">Fecha estimada</th>
                  <th class="col-dias">Plazo</th>
                </tr>
              </thead>
              <tbody>${filas}</tbody>
            </table>
          </div>`;
      }).join('');

      document.getElementById('fasesReporte').innerHTML = fasesHTML;

      // Mostrar contenido
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('contenido').classList.remove('hidden');
    }

    function formatFecha(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    cargarReporte();
  </script>
</body>
</html>
